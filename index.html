<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings-container">
        <h1>User Settings</h1>
        <form id="settingsForm">
            <!-- Account Settings -->
            <section class="settings-section">
                <h2>Account</h2>
                <label>Username:<br><input type="text" id="username" required></label>
                <label>Email:<br><input type="email" id="email" required></label>
            </section>

            <!-- Display Settings -->
            <section class="settings-section">
                <h2>Display</h2>
                <label>Theme:<br>
                    <select id="theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </label>
                <label>Font Size:<br>
                    <select id="fontSize">
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                    </select>
                </label>
            </section>

            <!-- Notification Settings -->
            <section class="settings-section">
                <h2>Notifications</h2>
                <label>Enable Email Alerts:<br><input type="checkbox" id="emailAlerts">
                </label>
                <label>Enable In-App Notifications:<br><input type="checkbox" id="inAppNotifications">
                </label>
            </section>

            <button type="submit">Save Settings</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
