<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyRank Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="settings-container">
            <h1>FlyRank Settings</h1>
            <form id="settingsForm" novalidate>
                <fieldset>
                    <legend>Account Information</legend>

                    <div class="form-group">
                        <label for="fullName">Full Name <span class="required">*</span></label>
                        <input
                            type="text"
                            id="fullName"
                            name="fullName"
                            autocomplete="name"
                            aria-required="true"
                            aria-invalid="false"
                        >
                        <small id="fullNameError" class="error-message" role="alert" aria-live="polite"></small>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            autocomplete="email"
                            aria-required="true"
                            aria-invalid="false"
                        >
                        <small id="emailError" class="error-message" role="alert" aria-live="polite"></small>
                    </div>

                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            autocomplete="new-password"
                            aria-required="true"
                            aria-invalid="false"
                        >
                        <small id="passwordError" class="error-message" role="alert" aria-live="polite"></small>
                    </div>
                </fieldset>

                <button type="submit" id="saveButton" disabled aria-disabled="true">
                    Save Settings
                </button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
